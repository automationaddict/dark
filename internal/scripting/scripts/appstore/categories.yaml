# categories.yaml — curated data for the dark App Store.
#
# This file is loaded by categories.lua via load_yaml(). Users can
# override it at $XDG_CONFIG_HOME/dark/scripts/appstore/categories.yaml
# to customize categories, XDG mappings, and the Featured list without
# modifying the Lua script.

# Maps XDG/freedesktop category strings to dark sidebar IDs.
# When a .desktop file lists multiple categories, the first match wins.
xdg_map:
